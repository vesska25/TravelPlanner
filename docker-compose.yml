# docker-compose.yml
services:
  db:
    image: postgres:16
    container_name: travelplanner-db
    environment:
      POSTGRES_DB: travelplanner
      POSTGRES_USER: traveluser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
