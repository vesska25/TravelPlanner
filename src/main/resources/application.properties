spring.application.name=TravelPlanner
# --- Connection to PostgreSQL ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelplanner}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:traveluser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devpassword}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}
jwt.expiration=${JWT_EXPIRATION:3600000}