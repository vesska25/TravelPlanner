spring.application.name=TravelPlanner
# --- Connection to PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/travelplanner
spring.datasource.username=traveluser
spring.datasource.password=devpassword

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT — вынести в переменные окружения на этапе подготовки к проду
jwt.secret=change-me-to-a-long-random-secret-at-least-32-chars
jwt.expiration=3600000
